<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Video Notes</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    background: #1e293b;
}

.container {
    padding: 15px;
    max-width: 1200px;
    margin: auto;
}

.input-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
}

iframe {
    width: 100%;
    height: 150px;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
    <h2>YouTube Video Notes</h2>
</header>

<div class="container">

    <div class="input-box">
        <input type="text" id="linkInput" placeholder="Paste YouTube link...">
        <button onclick="addVideo()">Add</button>
    </div>

    <div class="grid" id="videoGrid"></div>

</div>

<script>

// ===== ARRAY WITH 10 SAME LINKS =====
let videos = [
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY",
    "https://www.youtube.com/watch?v=XFmnkkDujJY"
];

// ===== EXTRACT YOUTUBE ID =====
function getVideoId(url) {
    let match = url.match(/v=([^&]+)/);
    return match ? match[1] : null;
}

// ===== RENDER VIDEOS =====
function renderVideos() {
    let grid = document.getElementById("videoGrid");
    grid.innerHTML = "";

    videos.forEach(link => {
        let id = getVideoId(link);
        if (!id) return;

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
            <p>${link}</p>
        `;

        grid.appendChild(card);
    });
}

// ===== ADD VIDEO =====
function addVideo() {
    let input = document.getElementById("linkInput");
    let link = input.value.trim();

    if (link === "") return;

    videos.push(link);
    input.value = "";
    renderVideos();
}

// INITIAL LOAD
renderVideos();

</script>

</body>
</html>
